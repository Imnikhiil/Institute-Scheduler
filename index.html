<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSEU Timetable Designer</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { background:#fff; padding:20px; border-radius:10px; max-width:900px; margin:auto; }
select, input, button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div class="container">
<h2>DSEU Timetable Designer</h2>

<select id="day"></select>
<input type="text" id="room" value="C-202">
<select id="start_t"></select>
<select id="end_t"></select>
<select id="course"></select>

<button onclick="addEntry()">Add</button>

<div id="list"></div>

<button onclick="generateDoc()">Generate</button>
</div>

<script>
let masterData = {};
let timeSlots = [];
let days = [];
let addedEntries = [];

// ✅ JSON Load
fetch('./data.json')
.then(res => res.json())
.then(data => {
    masterData = data.MASTER_COURSE_DATA;
    timeSlots = data.TIME_SLOTS;
    days = data.DAYS;
    init();
});

function init(){
    const day = document.getElementById('day');
    const start = document.getElementById('start_t');
    const end = document.getElementById('end_t');
    const course = document.getElementById('course');

    days.forEach(d => day.innerHTML += `<option>${d}</option>`);
    timeSlots.forEach(t => {
        start.innerHTML += `<option>${t}</option>`;
        end.innerHTML += `<option>${t}</option>`;
    });
    Object.keys(masterData).forEach(c => {
        course.innerHTML += `<option>${c}</option>`;
    });
}

// ✅ Add Entry
function addEntry(){
    const course = document.getElementById('course').value;
    const start = document.getElementById('start_t').value;
    const end = document.getElementById('end_t').value;

    const acrBase = masterData[course][2].split(' - ')[0];
    const isLec = timeSlots.indexOf(end) - timeSlots.indexOf(start) === 0;
    const finalAcr = isLec ? acrBase + " (L)" : acrBase + " (P)";

    addedEntries.push({
        day: document.getElementById('day').value,
        start_t: start,
        end_t: end,
        sub_full: course,
        acr: finalAcr,
        room: document.getElementById('room').value,
        pos: "Upper",
        is_lec: isLec
    });

    render();
}

// ✅ Render List
function render(){
    const div = document.getElementById('list');
    div.innerHTML = addedEntries.map(e => 
        `<p>${e.day} | ${e.start_t} - ${e.end_t} | ${e.sub_full}</p>`
    ).join('');
}

// ❌ GitHub limitation
function generateDoc(){
    alert("⚠️ Word file generation GitHub pe possible nahi hai.\nFlask backend required hai.");
}
</script>

</body>
</html>
